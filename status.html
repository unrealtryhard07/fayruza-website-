<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Status — Fayruza Restaurant</title>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#1F9578;--teal:#4DC4A3;--dark:#0A0F0D;--dark2:#0E1511;--card:#111714;--border:rgba(255,255,255,.08);--text:#EDF5F2;--muted:#7A9990;--red:#ff4757;--yellow:#ffd43b;}
body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;padding:20px;}

/* HEADER */
.header{text-align:center;padding:30px 20px 24px;}
.logo{font-family:'Bebas Neue';font-size:2rem;letter-spacing:5px;background:linear-gradient(90deg,var(--teal),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo-sub{font-family:'Barlow Condensed';font-size:.75rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-top:2px;}

/* SEARCH BOX */
.search-wrap{max-width:420px;margin:0 auto 32px;}
.search-label{font-family:'Barlow Condensed';font-size:.7rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:8px;text-align:center;}
.search-row{display:flex;gap:8px;}
.search-inp{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);font-family:'Barlow Condensed';font-size:1rem;letter-spacing:1px;padding:13px 16px;border-radius:10px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.search-inp:focus{border-color:var(--teal);}
.search-inp::placeholder{color:var(--muted);}
.search-btn{background:var(--green);color:#fff;font-family:'Bebas Neue';font-size:1rem;letter-spacing:2px;padding:13px 20px;border:none;border-radius:10px;cursor:pointer;white-space:nowrap;transition:background .2s;}
.search-btn:hover{background:#167A62;}
.search-btn:active{transform:scale(.97);}

/* STATUS CARD */
.status-card{max-width:420px;margin:0 auto;background:var(--dark2);border:1px solid var(--border);border-radius:16px;overflow:hidden;}

/* Order header */
.sc-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sc-oid{font-family:'Bebas Neue';font-size:1.3rem;letter-spacing:2px;}
.sc-time{font-family:'Barlow Condensed';font-size:.78rem;color:var(--muted);margin-top:2px;}
.sc-type{font-family:'Barlow Condensed';font-size:.78rem;color:var(--teal);letter-spacing:1px;}

/* Progress stepper */
.stepper{padding:24px 20px;}
.step{display:flex;align-items:flex-start;gap:14px;margin-bottom:0;position:relative;}
.step:not(:last-child)::after{content:'';position:absolute;left:15px;top:32px;width:2px;height:36px;background:var(--border);}
.step.done::after{background:var(--teal);}
.step.active::after{background:linear-gradient(to bottom,var(--teal),var(--border));}
.step-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.85rem;background:var(--card);transition:all .4s;}
.step.done .step-dot{background:var(--green);border-color:var(--green);color:#fff;}
.step.active .step-dot{background:var(--dark2);border-color:var(--teal);box-shadow:0 0 0 4px rgba(77,196,163,.15);animation:stepPulse 2s ease-in-out infinite;}
@keyframes stepPulse{0%,100%{box-shadow:0 0 0 4px rgba(77,196,163,.15);}50%{box-shadow:0 0 0 8px rgba(77,196,163,.05);}}
.step-info{padding:4px 0 28px;}
.step-title{font-family:'Bebas Neue';font-size:1rem;letter-spacing:2px;color:var(--muted);}
.step.done .step-title,.step.active .step-title{color:var(--text);}
.step.active .step-title{color:var(--teal);}
.step-sub{font-family:'Barlow Condensed';font-size:.8rem;color:var(--muted);margin-top:3px;letter-spacing:.5px;}

/* Items summary */
.sc-items{padding:0 20px 16px;}
.sc-items-title{font-family:'Barlow Condensed';font-size:.65rem;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.sc-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-family:'Barlow Condensed';font-size:.88rem;}
.sc-item:last-child{border-bottom:none;}
.sc-item-name{color:var(--text);}
.sc-item-qty{color:var(--muted);font-size:.78rem;margin-left:6px;}
.sc-item-price{color:var(--teal);font-weight:700;}

/* Total */
.sc-total{margin:0 20px 20px;padding:12px 14px;background:rgba(31,149,120,.08);border:1px solid rgba(31,149,120,.15);border-radius:8px;display:flex;justify-content:space-between;align-items:center;}
.sc-total-lbl{font-family:'Barlow Condensed';font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.sc-total-val{font-family:'Bebas Neue';font-size:1.4rem;color:var(--teal);}

/* Notes */
.sc-notes{margin:0 20px 20px;padding:10px 14px;background:rgba(255,212,59,.06);border:1px solid rgba(255,212,59,.15);border-radius:8px;font-family:'Barlow Condensed';font-size:.85rem;color:var(--yellow);}

/* Table/type badge */
.sc-meta{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;}
.sc-badge{font-family:'Barlow Condensed';font-size:.75rem;letter-spacing:1px;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.06);color:var(--muted);}

/* Auto-refresh indicator */
.refresh-bar{text-align:center;padding:16px;font-family:'Barlow Condensed';font-size:.75rem;letter-spacing:2px;color:var(--muted);}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#2ecc71;margin-right:5px;animation:pulse 2s ease-in-out infinite;vertical-align:middle;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* States */
.state-box{max-width:420px;margin:0 auto;text-align:center;padding:60px 20px;}
.state-icon{font-size:3.5rem;display:block;margin-bottom:16px;}
.state-title{font-family:'Bebas Neue';font-size:1.4rem;letter-spacing:3px;margin-bottom:6px;}
.state-sub{font-family:'Barlow Condensed';font-size:.9rem;color:var(--muted);letter-spacing:1px;}

/* Done celebration */
.done-banner{background:linear-gradient(135deg,rgba(31,149,120,.2),rgba(77,196,163,.1));border:1px solid rgba(31,149,120,.3);border-radius:10px;padding:16px;margin:0 20px 20px;text-align:center;}
.done-banner-title{font-family:'Bebas Neue';font-size:1.3rem;letter-spacing:3px;color:var(--teal);}
.done-banner-sub{font-family:'Barlow Condensed';font-size:.85rem;color:var(--muted);margin-top:4px;}

/* Back to menu */
.back-link{display:block;text-align:center;margin-top:24px;font-family:'Barlow Condensed';font-size:.85rem;letter-spacing:2px;color:var(--muted);text-decoration:none;}
.back-link:hover{color:var(--teal);}

/* cancelled */
.cancelled-banner{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.2);border-radius:10px;padding:14px;margin:0 20px 20px;text-align:center;}
.cancelled-banner-title{font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:2px;color:var(--red);}

body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(31,149,120,.06),transparent 70%);pointer-events:none;}
</style>
</head>
<body>

<div class="header">
  <div class="logo">FAYRUZA</div>
  <div class="logo-sub">Order Status Tracker</div>
</div>

<div class="search-wrap">
  <span class="search-label">Enter your Order ID</span>
  <div class="search-row">
    <input class="search-inp" id="oid-inp" type="text" placeholder="e.g. ORD-123456"
      autocomplete="off" autocapitalize="characters"
      onkeydown="if(event.key==='Enter') lookupOrder()">
    <button class="search-btn" onclick="lookupOrder()">TRACK</button>
  </div>
</div>

<div id="result-area"></div>

<a href="index.html" class="back-link">← Back to Menu</a>
<a href="history.html" class="back-link" style="margin-top:8px">📜 View Order History</a>

<script>
const SB_URL = 'https://zbsdmtjtypzfqrjuvpts.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpic2RtdGp0eXB6ZnFyanV2cHRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTQ2ODcsImV4cCI6MjA4OTgzMDY4N30.qeoSk8L7SQbsKetUEbm5Koe0iIIVlkhKkaaUG9qVrxo';
const sb = supabase.createClient(SB_URL, SB_KEY);

let currentOid = null;
let rtChannel = null;

function fmt(kd) {
  if (!kd) return '0 Fils';
  if (kd < 1) return Math.round(kd * 1000) + ' Fils';
  return Number(kd).toFixed(3) + ' KD';
}
function fmtTime(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleTimeString('en-KW', {hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
}

// Read order ID from URL ?order=ORD-123456
(function() {
  const params = new URLSearchParams(window.location.search);
  const oid = params.get('order');
  if (oid) {
    document.getElementById('oid-inp').value = oid;
    lookupOrder();
  }
})();

async function lookupOrder() {
  const raw = (document.getElementById('oid-inp').value || '').trim().toUpperCase();
  if (!raw) return;

  const area = document.getElementById('result-area');
  area.innerHTML = '<div class="state-box"><span class="state-icon">⏳</span><div class="state-title">LOOKING UP ORDER...</div></div>';

  try {
    const { data, error } = await sb.from('orders')
      .select('*')
      .or(`order_id.eq.${raw},order_id.ilike.${raw}`)
      .limit(1);

    if (error) throw error;

    if (!data || !data.length) {
      area.innerHTML = `<div class="state-box">
        <span class="state-icon">🔍</span>
        <div class="state-title">ORDER NOT FOUND</div>
        <div class="state-sub">Check your order ID and try again</div>
      </div>`;
      return;
    }

    renderOrder(data[0]);
    subscribeToOrder(data[0].id);
    currentOid = data[0].id;

  } catch(e) {
    area.innerHTML = `<div class="state-box"><span class="state-icon">⚠️</span><div class="state-title">ERROR</div><div class="state-sub">${e.message}</div></div>`;
  }
}

function renderOrder(order) {
  const typeL  = { dinein:'🍽 Dine In', takeaway:'🥡 Takeaway', delivery:'🚴 Delivery' };
  const payL   = { cash:'💵 Cash', knet:'💳 KNET', card:'💳 Card' };
  const status = order.status || 'new';

  const steps = [
    { key:'new',       icon:'📋', title:'ORDER RECEIVED',  sub:'Your order has been received and is being reviewed' },
    { key:'preparing', icon:'👨‍🍳', title:'BEING PREPARED', sub:'Our kitchen is preparing your order' },
    { key:'ready',     icon:'✅', title:'READY!',           sub: order.order_type === 'dinein' ? 'Your order is ready — please collect from the counter' : 'Your order is packed and ready to go!' },
    { key:'done',      icon:'🌟', title:'COMPLETED',        sub:'Thank you for dining with us!' },
  ];
  const statusOrder = ['new','preparing','ready','done'];
  const currentIdx  = statusOrder.indexOf(status);

  const area = document.getElementById('result-area');

  if (status === 'cancelled') {
    area.innerHTML = `
      <div class="status-card">
        <div class="sc-header">
          <div>
            <div class="sc-oid">#${order.order_id || order.id}</div>
            <div class="sc-time">${fmtDate(order.created_at)} · ${fmtTime(order.created_at)}</div>
          </div>
          <div class="sc-type">${typeL[order.order_type] || order.order_type || ''}</div>
        </div>
        <div style="padding:20px">
          <div class="cancelled-banner">
            <div class="cancelled-banner-title">❌ ORDER CANCELLED</div>
            <div style="font-family:'Barlow Condensed';font-size:.82rem;color:var(--muted);margin-top:4px">Please contact staff for assistance</div>
          </div>
        </div>
      </div>`;
    return;
  }

  const stepperHTML = steps.map((step, i) => {
    const isDone   = i < currentIdx;
    const isActive = i === currentIdx;
    const cls = isDone ? 'done' : isActive ? 'active' : '';
    const dotContent = isDone ? '✓' : step.icon;
    return `<div class="step ${cls}">
      <div class="step-dot">${dotContent}</div>
      <div class="step-info">
        <div class="step-title">${step.title}</div>
        ${isActive ? `<div class="step-sub">${step.sub}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  const itemsHTML = (order.items || []).map(i => `
    <div class="sc-item">
      <span class="sc-item-name">${i.emoji || ''} ${i.name}${i.size ? ' ('+i.size+')' : ''} <span class="sc-item-qty">×${i.qty}</span></span>
      <span class="sc-item-price">${fmt((i.price||0)*(i.qty||1))}</span>
    </div>`).join('');

  const doneBanner = status === 'done' ? `
    <div class="done-banner">
      <div class="done-banner-title">🌟 THANK YOU!</div>
      <div class="done-banner-sub">We hope you enjoyed your meal · شكراً لزيارتكم</div>
    </div>` : '';

  const readyBanner = status === 'ready' ? `
    <div class="done-banner" style="background:linear-gradient(135deg,rgba(77,196,163,.2),rgba(31,149,120,.1));border-color:rgba(77,196,163,.4);">
      <div class="done-banner-title" style="font-size:1.5rem">✅ YOUR ORDER IS READY!</div>
      <div class="done-banner-sub">${order.order_type === 'dinein' ? 'Please collect from the counter' : 'Your order is packed and ready'}</div>
    </div>` : '';

  area.innerHTML = `
    <div class="status-card">
      <div class="sc-header">
        <div>
          <div class="sc-oid">#${order.order_id || order.id}</div>
          <div class="sc-time">${fmtDate(order.created_at)} · ${fmtTime(order.created_at)}</div>
        </div>
        <div class="sc-type">${typeL[order.order_type] || order.order_type || ''}</div>
      </div>
      ${readyBanner}
      ${doneBanner}
      <div class="stepper">${stepperHTML}</div>
      <div class="sc-items">
        <div class="sc-items-title">Your Items</div>
        ${itemsHTML}
      </div>
      <div class="sc-total">
        <span class="sc-total-lbl">Total</span>
        <span class="sc-total-val">${fmt(order.total)}</span>
      </div>
      ${order.notes ? `<div class="sc-notes">📝 ${order.notes}</div>` : ''}
      <div class="sc-meta">
        <span class="sc-badge">${payL[order.payment_method] || order.payment_method || 'Cash'}</span>
        ${order.table_number ? `<span class="sc-badge">Table ${order.table_number}</span>` : ''}
        ${order.customer_name ? `<span class="sc-badge">${order.customer_name}</span>` : ''}
      </div>
    </div>
    ${(status !== 'done' && status !== 'cancelled') ? `<div class="refresh-bar"><span class="live-dot"></span>UPDATING LIVE</div>` : ''}`;
}

function subscribeToOrder(id) {
  // Unsubscribe from previous
  if (rtChannel) { rtChannel.unsubscribe(); rtChannel = null; }

  rtChannel = sb.channel('status-order-' + id);
  rtChannel.on('postgres_changes',
    { event: 'UPDATE', schema: 'public', table: 'orders', filter: 'id=eq.' + id },
    function(payload) {
      if (payload.new) renderOrder(payload.new);
    }
  ).subscribe();
}
</script>
</body>
</html>

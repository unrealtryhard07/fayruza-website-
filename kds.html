<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fayruza KDS — Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--green:#1F9578;--teal:#4DC4A3;--dark:#060A08;--card:#0D1410;--border:rgba(255,255,255,.08);--text:#EDF5F2;--muted:#5A7A70;--red:#ff4757;--yellow:#ffd43b;--orange:#ff9f43;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden;}

/* TOPBAR */
.topbar{background:#080D0B;border-bottom:2px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tb-brand{font-family:'Bebas Neue';font-size:1.4rem;letter-spacing:4px;background:linear-gradient(90deg,var(--teal),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-title{font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:3px;color:var(--muted);}
.tb-right{display:flex;align-items:center;gap:16px;}
.tb-clock{font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:2px;color:var(--teal);}
.live-dot{width:8px;height:8px;border-radius:50%;background:#2ecc71;display:inline-block;margin-right:6px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
.filter-tabs{display:flex;gap:6px;}
.ftab{font-family:'Bebas Neue';font-size:.85rem;letter-spacing:2px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;}
.ftab.active{background:var(--green);border-color:var(--green);color:#fff;}

/* GRID */
.kds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:16px 20px 80px;}

/* ORDER CARD */
.kds-card{background:var(--card);border:2px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .3s,transform .2s;}
.kds-card.new{border-color:var(--red);animation:newPulse 2s ease-in-out infinite;}
.kds-card.preparing{border-color:var(--yellow);}
.kds-card.ready{border-color:var(--teal);}
@keyframes newPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,71,87,.3);}50%{box-shadow:0 0 0 8px rgba(255,71,87,0);}}

.kds-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.kds-oid{font-family:'Bebas Neue';font-size:1.2rem;letter-spacing:2px;}
.kds-time{font-family:'Barlow Condensed';font-size:.75rem;color:var(--muted);}
.kds-meta{display:flex;align-items:center;gap:8px;}
.kds-type{font-family:'Bebas Neue';font-size:.72rem;letter-spacing:1px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.06);}
.kds-table{font-family:'Bebas Neue';font-size:.9rem;letter-spacing:1px;color:var(--yellow);}
.kds-timer{font-family:'Bebas Neue';font-size:.85rem;letter-spacing:1px;padding:3px 8px;border-radius:4px;}
.kds-timer.ok{background:rgba(46,204,113,.1);color:#2ecc71;}
.kds-timer.warn{background:rgba(255,159,67,.1);color:var(--orange);}
.kds-timer.late{background:rgba(255,71,87,.15);color:var(--red);}

.kds-items{padding:10px 14px;}
.kds-item{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.kds-item:last-child{border-bottom:none;}
.kds-item-qty{font-family:'Bebas Neue';font-size:1.4rem;color:var(--teal);min-width:26px;line-height:1;}
.kds-item-name{font-family:'Barlow Condensed';font-weight:700;font-size:.95rem;text-transform:uppercase;letter-spacing:.5px;color:var(--text);}
.kds-item-note{font-size:.75rem;color:var(--muted);margin-top:1px;}

.kds-notes{padding:0 14px 10px;font-family:'Barlow Condensed';font-size:.82rem;color:var(--yellow);background:rgba(255,212,59,.05);border-top:1px solid rgba(255,212,59,.1);padding:8px 14px;}
.kds-notes::before{content:'📝 ';font-size:.75rem;}

.kds-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;}
.kds-btn{flex:1;padding:10px 8px;font-family:'Bebas Neue';font-size:.9rem;letter-spacing:2px;border:none;border-radius:7px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.kds-btn:active{transform:scale(.97);}
.btn-bump{background:var(--green);color:#fff;}
.btn-bump:hover{background:#167A62;}
.btn-done{background:rgba(77,196,163,.15);color:var(--teal);border:1px solid rgba(77,196,163,.3);}

/* EMPTY STATE */
.kds-empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted);}
.kds-empty-icon{font-size:4rem;display:block;margin-bottom:16px;opacity:.4;}
.kds-empty-txt{font-family:'Bebas Neue';font-size:1.4rem;letter-spacing:3px;}
.kds-empty-sub{font-family:'Barlow Condensed';font-size:.9rem;letter-spacing:1px;margin-top:6px;}

/* STATS BAR */
.stats-bar{display:flex;gap:14px;padding:10px 20px;background:#080D0B;border-bottom:1px solid var(--border);}
.stat-chip{font-family:'Barlow Condensed';font-size:.8rem;letter-spacing:2px;text-transform:uppercase;}
.stat-chip span{font-family:'Bebas Neue';font-size:1.1rem;margin-right:4px;}
.s-new{color:var(--red);}
.s-prep{color:var(--yellow);}
.s-ready{color:var(--teal);}

/* SOUND toggle */
.sound-btn{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);font-family:'Bebas Neue';font-size:.75rem;letter-spacing:2px;padding:5px 10px;border-radius:6px;cursor:pointer;}
.sound-btn.on{background:rgba(31,149,120,.1);border-color:rgba(31,149,120,.3);color:var(--teal);}

@media(max-width:600px){.kds-grid{grid-template-columns:1fr;padding:10px;}.topbar{flex-wrap:wrap;gap:8px;}.filter-tabs{order:3;width:100%;}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="tb-brand">FAYRUZA</div>
    <div class="tb-title">KITCHEN DISPLAY</div>
  </div>
  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('active',this)">🔴 NEW + PREP</button>
    <button class="ftab" onclick="setFilter('new',this)">🔴 NEW</button>
    <button class="ftab" onclick="setFilter('preparing',this)">🟡 PREPARING</button>
    <button class="ftab" onclick="setFilter('ready',this)">🟢 READY</button>
  </div>
  <div class="tb-right">
    <button class="sound-btn on" id="sound-btn" onclick="toggleSound()">🔔 SOUND</button>
    <div style="text-align:right">
      <div class="tb-clock" id="kds-clock">--:--:--</div>
      <div style="font-family:'Barlow Condensed';font-size:.7rem;color:var(--muted);letter-spacing:1px"><span class="live-dot"></span>LIVE</div>
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-chip s-new"><span id="cnt-new">0</span>NEW</div>
  <div class="stat-chip s-prep"><span id="cnt-prep">0</span>PREPARING</div>
  <div class="stat-chip s-ready"><span id="cnt-ready">0</span>READY</div>
  <div class="stat-chip" style="margin-left:auto;color:var(--muted)"><span id="cnt-total">0</span>TODAY</div>
</div>

<div class="kds-grid" id="kds-grid">
  <div class="kds-empty">
    <span class="kds-empty-icon">🍳</span>
    <div class="kds-empty-txt">LOADING ORDERS...</div>
  </div>
</div>

<script>
const SB_URL = 'https://zbsdmtjtypzfqrjuvpts.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpic2RtdGp0eXB6ZnFyanV2cHRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTQ2ODcsImV4cCI6MjA4OTgzMDY4N30.qeoSk8L7SQbsKetUEbm5Koe0iIIVlkhKkaaUG9qVrxo';
const sb = supabase.createClient(SB_URL, SB_KEY);

let allOrders = [];
let kdsFilter = 'active';
let soundOn = true;
let knownIds = new Set();

// Audio — simple beep using Web Audio API
function beep() {
  if (!soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach(function(t) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.4, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.12);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + 0.13);
    });
  } catch(e) {}
}

function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById('sound-btn');
  btn.textContent = soundOn ? '🔔 SOUND' : '🔕 MUTED';
  btn.className = 'sound-btn' + (soundOn ? ' on' : '');
}

function setFilter(f, btn) {
  kdsFilter = f;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function elapsed(created) {
  const mins = Math.floor((Date.now() - new Date(created)) / 60000);
  return mins;
}

function timerClass(mins) {
  if (mins < 10) return 'ok';
  if (mins < 20) return 'warn';
  return 'late';
}

function fmtElapsed(mins) {
  if (mins < 60) return mins + 'm';
  return Math.floor(mins/60) + 'h ' + (mins%60) + 'm';
}

async function loadOrders() {
  try {
    const { data, error } = await sb.from('orders')
      .select('*')
      .in('status', ['new','preparing','ready'])
      .order('created_at', { ascending: true });
    if (error) throw error;

    // Detect truly new orders (not in our known set)
    const incoming = (data || []).filter(o => o.status === 'new' && !knownIds.has(o.id));
    if (incoming.length > 0 && knownIds.size > 0) beep(); // don't beep on first load
    (data || []).forEach(o => knownIds.add(o.id));

    allOrders = data || [];
    renderStats();
    renderGrid();
  } catch(e) {
    console.error('KDS load error:', e);
  }
}

function renderStats() {
  const today = new Date().toDateString();
  document.getElementById('cnt-new').textContent    = allOrders.filter(o => o.status==='new').length + ' ';
  document.getElementById('cnt-prep').textContent   = allOrders.filter(o => o.status==='preparing').length + ' ';
  document.getElementById('cnt-ready').textContent  = allOrders.filter(o => o.status==='ready').length + ' ';
  document.getElementById('cnt-total').textContent  = allOrders.length + ' ';
}

function renderGrid() {
  const grid = document.getElementById('kds-grid');
  let orders = allOrders;

  if (kdsFilter === 'active')    orders = orders.filter(o => o.status === 'new' || o.status === 'preparing');
  else if (kdsFilter !== 'all')  orders = orders.filter(o => o.status === kdsFilter);

  if (!orders.length) {
    const msgs = {
      active:    ['ALL CLEAR!','No pending orders right now'],
      new:       ['NO NEW ORDERS','Waiting for incoming orders...'],
      preparing: ['NOTHING COOKING','All caught up'],
      ready:     ['NOTHING READY','Keep cooking!'],
    };
    const [title, sub] = msgs[kdsFilter] || ['NO ORDERS',''];
    grid.innerHTML = `<div class="kds-empty">
      <span class="kds-empty-icon">${kdsFilter === 'active' ? '✅' : '🍳'}</span>
      <div class="kds-empty-txt">${title}</div>
      <div class="kds-empty-sub">${sub}</div>
    </div>`;
    return;
  }

  const typeL = { dinein:'🍽 Dine In', takeaway:'🥡 Takeaway', delivery:'🚴 Delivery' };

  grid.innerHTML = orders.map(function(o) {
    const mins = elapsed(o.created_at);
    const tc   = timerClass(mins);
    const items = (o.items || []);

    const nextStatus = o.status === 'new' ? 'preparing' : o.status === 'preparing' ? 'ready' : null;
    const bumpLabel  = o.status === 'new' ? '▶ START PREP' : o.status === 'preparing' ? '✓ MARK READY' : null;

    return `<div class="kds-card ${o.status}" id="kc-${o.id}">
      <div class="kds-header">
        <div>
          <div class="kds-oid">${o.order_id || '#'+o.id}</div>
          <div class="kds-time">${new Date(o.created_at).toLocaleTimeString('en-KW',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
        <div class="kds-meta">
          ${o.table_number ? `<span class="kds-table">T${o.table_number}</span>` : ''}
          <span class="kds-type">${typeL[o.order_type] || o.order_type || '—'}</span>
          <span class="kds-timer ${tc}">${fmtElapsed(mins)}</span>
        </div>
      </div>
      <div class="kds-items">
        ${items.map(function(i) {
          return `<div class="kds-item">
            <span class="kds-item-qty">${i.qty}</span>
            <div>
              <div class="kds-item-name">${i.emoji||''} ${i.name}${i.size?' ('+i.size+')':''}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
      ${o.notes ? `<div class="kds-notes">${o.notes}</div>` : ''}
      <div class="kds-footer">
        ${nextStatus ? `<button class="kds-btn btn-bump" onclick="bumpOrder('${o.id}','${nextStatus}')">${bumpLabel}</button>` : ''}
        ${o.status === 'ready' ? `<button class="kds-btn btn-done" onclick="bumpOrder('${o.id}','done')">✓ DONE</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function bumpOrder(id, newStatus) {
  const card = document.getElementById('kc-' + id);
  if (card) { card.style.opacity = '.5'; card.style.pointerEvents = 'none'; }
  try {
    const { error } = await sb.from('orders').update({ status: newStatus }).eq('id', id);
    if (error) throw error;
    await loadOrders();
  } catch(e) {
    if (card) { card.style.opacity = '1'; card.style.pointerEvents = ''; }
    alert('Error: ' + e.message);
  }
}

// Realtime subscription — requires Replication enabled on orders table in Supabase
function subscribeKDS() {
  const ch = sb.channel('kds-orders-' + Date.now()); // unique channel name avoids stale subs
  ch.on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, function() {
    loadOrders();
  })
  .subscribe(function(status) {
    const dot = document.querySelector('.live-dot');
    if (status === 'SUBSCRIBED') {
      if (dot) { dot.style.background = '#2ecc71'; dot.title = 'Realtime connected'; }
    } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
      if (dot) { dot.style.background = 'var(--orange)'; dot.title = 'Realtime error — polling every 3s'; }
      setTimeout(function() { ch.unsubscribe(); subscribeKDS(); }, 5000);
    }
  });
}
subscribeKDS();

// Clock
function updateClock() {
  document.getElementById('kds-clock').textContent =
    new Date().toLocaleTimeString('en-KW', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// Refresh timers every minute (so elapsed times update)
setInterval(renderGrid, 60000);

// Initial load
loadOrders();
setInterval(loadOrders, 3000); // 3s fallback poll
</script>
</body>
</html>
